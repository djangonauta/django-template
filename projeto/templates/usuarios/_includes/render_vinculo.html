{% with vinculo=request.session.vinculo_selecionado %}
  {% if vinculo %}
    <a href="{% url "usuarios:vinculo-select" %}" title="Clique para alterar seu vínculo">
      {{ vinculo.unidade.nome }} - {{ vinculo.unidade.codigo }} ({{ vinculo.responsabilidade }})
    </a>
  {% else %}
    <h6>Sem vínculo selecionado</h6>
  {% endif %}
{% endwith %}
